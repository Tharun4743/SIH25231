<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AURA Core Startup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .logo {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #3B82F6 0%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            animation: pulse 2.5s infinite alternate;
        }
        @keyframes pulse {
            0% {
                transform: scale(0.98);
                filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.3));
            }
            100% {
                transform: scale(1.02);
                filter: drop-shadow(0 0 16px rgba(168, 85, 247, 0.6));
            }
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(148, 163, 184, 0.1);
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 32px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-box {
            min-height: 48px;
            margin-bottom: 16px;
        }
        .status-text {
            font-size: 14px;
            color: #94A3B8;
            font-weight: 500;
            transition: color 0.3s;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(148, 163, 184, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #3B82F6, #A855F7);
            border-radius: 3px;
            animation: loading-pulse 2s infinite ease-in-out;
        }
        @keyframes loading-pulse {
            0% {
                margin-left: -30%;
            }
            100% {
                margin-left: 100%;
            }
        }
        .error-message {
            color: #EF4444;
            font-size: 13px;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            text-align: left;
            width: 100%;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }
        .btn-exit {
            background-color: #334155;
            color: #F8FAFC;
            border: none;
            padding: 8px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }
        .btn-exit:hover {
            background-color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AURA</div>
        <div id="spinner" class="spinner"></div>
        <div class="status-box">
            <div id="status" class="status-text">Cleaning previous installation...</div>
        </div>
        <div id="progress-container" class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div id="error-box" class="error-message"></div>
        <button id="exit-btn" class="btn-exit" onclick="exitApplication()">Exit</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        ipcRenderer.on('status-update', (event, message) => {
            document.getElementById('status').innerText = message;
        });

        ipcRenderer.on('status-error', (event, errorText) => {
            document.getElementById('status').style.color = '#EF4444';
            document.getElementById('status').innerText = 'Neural Engine Unreachable';
            
            const errorBox = document.getElementById('error-box');
            errorBox.innerText = errorText;
            errorBox.style.display = 'block';

            document.getElementById('spinner').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.getElementById('exit-btn').style.display = 'block';
        });

        function exitApplication() {
            ipcRenderer.send('exit-app');
        }
    </script>
</body>
</html>
