<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
    <title>AURA — Starting Up</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #0F172A;
            color: #F8FAFC;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Logo ── */
        .logo {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #3B82F6 0%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        .tagline {
            font-size: 11px;
            color: #475569;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
        }

        @keyframes logoGlow {
            0%  { filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.3)); }
            100%{ filter: drop-shadow(0 0 18px rgba(168, 85, 247, 0.6)); }
        }

        /* ── Container ── */
        .container {
            width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Spinner ── */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(148, 163, 184, 0.1);
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Progress bar ── */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #3B82F6, #A855F7);
            border-radius: 2px;
            animation: indeterminate 2s ease-in-out infinite;
            transition: width 0.4s ease;
        }
        .progress-fill.determinate {
            animation: none;
        }
        @keyframes indeterminate {
            0%   { margin-left: -30%; width: 30%; }
            100% { margin-left: 100%; width: 30%; }
        }

        /* ── Status text ── */
        .status-line {
            font-size: 13px;
            color: #94A3B8;
            font-weight: 500;
            text-align: center;
            min-height: 20px;
            margin-bottom: 6px;
            transition: color 0.3s;
        }
        .status-sub {
            font-size: 11px;
            color: #475569;
            text-align: center;
            min-height: 16px;
            font-family: 'Consolas', 'Cascadia Code', monospace;
            margin-bottom: 28px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 480px;
        }

        /* ── Model download row ── */
        .model-row {
            width: 100%;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 10px;
            padding: 12px 16px;
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .model-row.visible { display: flex; }
        .model-label {
            font-size: 11px;
            color: #64748B;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .model-name {
            font-size: 13px;
            color: #CBD5E1;
            font-weight: 600;
        }
        .model-progress-track {
            width: 100%;
            height: 6px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .model-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6, #A855F7);
            border-radius: 3px;
            width: 0%;
            transition: width 0.5s ease;
        }
        .model-pct {
            font-size: 11px;
            color: #64748B;
            text-align: right;
            font-family: monospace;
        }

        /* ── Error state ── */
        .error-box {
            display: none;
            width: 100%;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 10px;
            padding: 14px 16px;
            color: #FCA5A5;
            font-size: 12px;
            white-space: pre-wrap;
            text-align: left;
            max-height: 140px;
            overflow-y: auto;
            margin-bottom: 14px;
            line-height: 1.5;
        }
        .error-box.visible { display: block; }
        .btn-exit {
            display: none;
            padding: 8px 24px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(51, 65, 85, 0.6);
            color: #F8FAFC;
            transition: background 0.2s;
        }
        .btn-exit:hover { background: rgba(71, 85, 105, 0.8); }
        .btn-exit.visible { display: block; }

        /* ── Version footer ── */
        .version-tag {
            position: fixed;
            bottom: 12px;
            font-size: 10px;
            color: #1E293B;
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">AURA</div>
        <div class="tagline">AI Unified Retrieval Assistant</div>

        <!-- Spinner (hidden during error / install prompt) -->
        <div id="spinner" class="spinner"></div>

        <!-- Main progress bar (indeterminate by default) -->
        <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
        </div>

        <!-- Status messages -->
        <div id="status" class="status-line">Initializing...</div>
        <div id="status-sub" class="status-sub">&nbsp;</div>

        <!-- Model download section (shown during ollama pull) -->
        <div id="model-row" class="model-row">
            <div class="model-label">Downloading AI Model</div>
            <div id="model-name" class="model-name">—</div>
            <div class="model-progress-track">
                <div id="model-progress" class="model-progress-fill"></div>
            </div>
            <div id="model-pct" class="model-pct">0%</div>
        </div>

        <!-- Error state -->
        <div id="error-box" class="error-box"></div>
        <button id="btn-exit" class="btn-exit">Exit</button>
    </div>

    <div class="version-tag">v1.0.0 &nbsp;·&nbsp; Local Mode</div>

    <script>
        // ── Connect to main process via secure contextBridge API ──
        const api = window.auraApi;

        const spinner    = document.getElementById('spinner');
        const progressFill = document.getElementById('progress-fill');
        const statusEl   = document.getElementById('status');
        const statusSub  = document.getElementById('status-sub');
        const modelRow   = document.getElementById('model-row');
        const modelName  = document.getElementById('model-name');
        const modelProgress = document.getElementById('model-progress');
        const modelPct   = document.getElementById('model-pct');
        const errorBox   = document.getElementById('error-box');
        const btnExit    = document.getElementById('btn-exit');

        // Status update from main process
        api.onStatusUpdate((message) => {
            statusEl.textContent = message;
            statusEl.style.color = '#94A3B8';
            if (!message.toLowerCase().includes('download') && !message.toLowerCase().includes('pulling')) {
                statusSub.textContent = '\u00A0';
            }
        });

        // Fatal error from main process
        api.onStatusError((errorText) => {
            statusEl.textContent = 'Setup Failed';
            statusEl.style.color = '#EF4444';
            statusSub.textContent = '\u00A0';

            spinner.style.display = 'none';
            progressFill.parentElement.style.display = 'none';
            modelRow.classList.remove('visible');

            errorBox.textContent = errorText;
            errorBox.classList.add('visible');
            btnExit.classList.add('visible');
        });

        // Model download progress
        api.onPullProgress(({ model, percent, status }) => {
            modelRow.classList.add('visible');

            modelName.textContent = model;
            modelProgress.style.width = percent + '%';
            modelPct.textContent = percent + '%';

            statusEl.textContent = 'Downloading AI model...';
            statusSub.textContent = status || '\u00A0';

            // Switch progress bar to determinate mode
            progressFill.classList.add('determinate');
            progressFill.style.width = percent + '%';
        });

        // Exit button
        btnExit.addEventListener('click', () => {
            api.exitApp();
        });
    </script>
</body>
</html>
